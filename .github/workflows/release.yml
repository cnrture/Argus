name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o $CERT_PATH

          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Resolve packages
        run: |
          cd NotchPilot
          xcodebuild -resolvePackageDependencies \
            -project NotchPilot.xcodeproj \
            -scheme NotchPilot

      - name: Build archive
        run: |
          cd NotchPilot
          xcodebuild archive \
            -project NotchPilot.xcodeproj \
            -scheme NotchPilot \
            -archivePath $RUNNER_TEMP/NotchPilot.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Export archive
        run: |
          cd NotchPilot
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NotchPilot.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Build bridge
        run: |
          cd NotchPilot
          xcodebuild -project NotchPilot.xcodeproj \
            -scheme notchpilot-bridge \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/bridge-build
          cp $RUNNER_TEMP/bridge-build/Build/Products/Release/notchpilot-bridge \
            $RUNNER_TEMP/export/NotchPilot.app/Contents/Resources/

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            $RUNNER_TEMP/export/NotchPilot.app \
            $RUNNER_TEMP/NotchPilot.zip

          xcrun notarytool submit $RUNNER_TEMP/NotchPilot.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple $RUNNER_TEMP/export/NotchPilot.app

      - name: Create DMG
        run: |
          hdiutil create -volname "NotchPilot" \
            -srcfolder $RUNNER_TEMP/export/NotchPilot.app \
            -ov -format UDZO \
            $RUNNER_TEMP/NotchPilot.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/NotchPilot.dmg
          draft: false
          prerelease: false
